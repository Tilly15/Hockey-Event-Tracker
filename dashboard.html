<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hockey Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <h1>Hockey Analytics Dashboard</h1>

  <a href="index.html">Back to Logger</a>

  <section>
    <label>
      Season:
      <select id="seasonSelect"></select>
    </label>

    <label>
      Game:
      <select id="gameSelect"></select>
    </label>

    <button id="loadDashboardBtn" type="button">Load Dashboard</button>
  </section>

  <section id="summary">
    <h2>Summary</h2>
    <p>Select a season and game to view stats.</p>
  </section>

<section id="shotMapSection" style="display: none;">
  <h2>Shot Map</h2>

  <label>
    Shot Map Type:
    <select id="shotMapType">
      <option value="for">Shots For</option>
      <option value="against">Shots Against</option>
    </select>
  </label>

<div id="dashboardRink">
  <div class="dash-line dash-goal-line left"></div>
  <div class="dash-line dash-goal-line right"></div>
  <div class="dash-line dash-blue-line left"></div>
  <div class="dash-line dash-blue-line right"></div>
  <div class="dash-line dash-center-line"></div>

  <div class="dash-faceoff-circle left-zone top"></div>
  <div class="dash-faceoff-circle left-zone bottom"></div>
  <div class="dash-faceoff-circle right-zone top"></div>
  <div class="dash-faceoff-circle right-zone bottom"></div>
  <div class="dash-center-circle"></div>

  <div class="dash-faceoff-dot left-top-dot"></div>
  <div class="dash-faceoff-dot left-bottom-dot"></div>
  <div class="dash-faceoff-dot right-top-dot"></div>
  <div class="dash-faceoff-dot right-bottom-dot"></div>

  <div class="dash-neutral-dot left-top-neutral"></div>
  <div class="dash-neutral-dot left-bottom-neutral"></div>
  <div class="dash-neutral-dot right-top-neutral"></div>
  <div class="dash-neutral-dot right-bottom-neutral"></div>

  <div class="dash-crease left-crease"></div>
  <div class="dash-crease right-crease"></div>

  <div id="shotMapDots"></div>
</div>
</section>

  <section>
  <h2>Season Roster</h2>

  <label>
    Player Number:
    <input id="rosterNumber" type="text" placeholder="8" />
  </label>

  <label>
    Player Name:
    <input id="rosterName" type="text" placeholder="John Smith" />
  </label>

  <button id="addRosterPlayerBtn" type="button">Add Player</button>

  <div id="rosterList"></div>
</section>

  <section>
  <h2>Player Totals</h2>
  <div id="playerTotals"></div>
</section>

<label>
  Situation:
  <select id="situationFilter">
    <option value="all">All Situations</option>
    <option value="even">Even Strength</option>
    <option value="powerplay">Power Play</option>
    <option value="shorthanded">Shorthanded</option>
    <option value="5v5">5v5</option>
    <option value="4v4">4v4</option>
    <option value="3v3">3v3</option>
    <option value="5v4">5v4</option>
    <option value="5v3">5v3</option>
    <option value="4v3">4v3</option>
    <option value="6v5">6v5</option>
    <option value="6v4">6v4</option>
    <option value="6v3">6v3</option>
    <option value="4v5">4v5</option>
    <option value="3v5">3v5</option>
    <option value="3v4">3v4</option>
    <option value="5v6">5v6</option>
    <option value="4v6">4v6</option>
    <option value="3v6">3v6</option>
  </select>


</label>



<section>
  <h2>Season Player Cards</h2>
  <button id="loadSeasonCardsBtn" type="button">Load Season Cards</button>
  <div id="playerCards"></div>
</section>

<label>
  Player:
  <select id="seasonCardPlayerSelect">
    <option value="all">All Players</option>
  </select>
</label>

  <script src="dashboard.js"></script>
</body>
</html>
